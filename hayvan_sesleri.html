<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hayvan Sesleri</title>
    <meta name="theme-color" content="#22c55e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="js/sw-register.js" defer></script>
    <style>
        /* --- DİNLE AŞAMASI --- */
        .sounds-grid {
            display: grid;
            gap: 16px;
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            justify-content: center;
        }

        .animal-sound-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #fff;
            border-radius: 20px;
            padding: 12px 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
            user-select: none;
            box-sizing: border-box;
        }

        .animal-sound-card:hover { transform: scale(1.05); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .animal-sound-card:active { transform: scale(0.96); }

        .animal-sound-card.playing {
            border-color: #22c55e;
            box-shadow: 0 0 0 4px rgba(34,197,94,0.25);
            transform: scale(1.07);
        }

        .animal-sound-card.listened {
            border-color: #86efac;
            background: #f0fdf4;
        }

        .animal-sound-card img { object-fit: contain; border-radius: 12px; }
        .animal-sound-card .animal-name { font-size: 1rem; font-weight: 700; color: #334155; }
        .animal-sound-card .sound-icon { font-size: 1.4rem; }
        .animal-sound-card.playing .sound-icon { animation: bounce-icon 0.5s infinite alternate; }

        @keyframes bounce-icon {
            from { transform: scale(1); }
            to   { transform: scale(1.35); }
        }

        /* --- QUIZ ALANI --- */
        #quiz-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
            padding: 10px 16px 20px;
            box-sizing: border-box;
        }

        .choices-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            width: 100%;
            max-width: 560px;
        }

        .choice-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #fff;
            border-radius: 20px;
            padding: 14px 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.15s, border-color 0.2s;
            user-select: none;
            box-sizing: border-box;
        }

        .choice-card:hover { transform: scale(1.05); }
        .choice-card:active { transform: scale(0.95); }

        .choice-card img {
            object-fit: contain;
            border-radius: 10px;
        }

        .choice-card .cross-mark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .choice-card.correct {
            border-color: #22c55e;
            background: #f0fdf4;
        }

        .choice-card.wrong {
            border-color: #ef4444;
            background: #fef2f2;
            animation: shake-card 0.5s ease;
        }

        .choice-card.wrong .cross-mark { opacity: 1; }

        @keyframes shake-card {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-8px); }
            40%       { transform: translateX(8px); }
            60%       { transform: translateX(-6px); }
            80%       { transform: translateX(5px); }
        }
    </style>
</head>
<body>

<div id="celebration-overlay" class="overlay hidden">
    <div class="celebration-content"></div>
</div>

    <div class="carousel-header">
        <a href="hayvanlar_menu.html" class="back-btn-carousel">⬅</a>
    </div>

    <div class="game-container">

        <button id="replay-btn" class="audio-btn">🔊 Sesi Tekrar Dinle</button>

        <!-- Dinle aşaması -->
        <div class="sounds-grid" id="sounds-grid"></div>

        <!-- Quiz aşaması -->
        <div id="quiz-area" class="hidden">
            <div class="choices-grid" id="choices-grid"></div>
        </div>
    </div>

    <script src="js/game.js"></script>
    <script src="js/common_bgm.js"></script>
</body>
</html>
