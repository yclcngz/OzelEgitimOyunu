<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Hayvanlar Menüsü</title>
    <meta name="theme-color" content="#22c55e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/sw-register.js" defer></script>
  </head>
  <body class="carousel-page">
    <div class="carousel-header">
      <a href="index.html" class="back-btn-carousel">⬅</a>
    </div>

    <div class="main-menu-grid" id="carousel">
      <a
        href="hayvanlari_taniyalim.html"
        class="menu-img-btn"
        data-title="Hayvanları Tanıyalım"
      >
        <button class="play-btn">▶ OYNA</button>
        <img
          src="assets/images/hayvanlari%20taniyalim.png"
          alt="Hayvanları Tanıyalım"
        />
        <button
          class="song-btn"
          data-song="assets/sounds/hayvanlari_taniyalim_sarki.mp3"
        >
          DİNLE
        </button>
      </a>
      <a
        href="hayvan_eslestirme.html"
        class="menu-img-btn"
        data-title="Hayvan Eşleştirme"
      >
        <button class="play-btn">▶ OYNA</button>
        <img
          src="assets/images/hayvan%20eslestirme.png"
          alt="Hayvan Eşleştirme"
        />
        <button
          class="song-btn"
          data-song="assets/sounds/hayvan_eslestirme_sarki.mp3"
        >
          DİNLE
        </button>
      </a>
      <a
        href="hayvan_bulmaca.html"
        class="menu-img-btn"
        data-title="Hayvan Bulmacası"
      >
        <button class="play-btn">▶ Oyna</button>
        <img
          src="assets/images/hayvan%20bulmacasi.png"
          alt="Hayvan Bulmacası"
        />
        <button
          class="song-btn"
          data-song="assets/sounds/hayvanlar_bulmaca_kartlari_sarki.mp3"
        >
          Şarkıyı Dinle
        </button>
      </a>
      <a
        href="hayvan_sesleri.html"
        class="menu-img-btn"
        data-title="Hayvan Sesleri"
      >
        <button class="play-btn">▶ Oyna</button>
        <img
          src="assets/images/hayvan%20sesleri.png"
          alt="Hayvan Sesleri"
        />
        <button
          class="song-btn"
          data-song="assets/sounds/hayvanlari_taniyalim_sarki.mp3"
        >
          Şarkıyı Dinle
        </button>
      </a>
    </div>

    <button class="carousel-arrow carousel-prev" id="prevBtn">&#8592;</button>
    <button class="carousel-arrow carousel-next" id="nextBtn">&#8594;</button>

    <div class="carousel-dots" id="dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <script src="js/carousel.js"></script>
  </body>
</html>
