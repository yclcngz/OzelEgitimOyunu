<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Noktaları Birleştir</title>
    <meta name="theme-color" content="#8b5cf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="js/sw-register.js" defer></script>
    <style>
        .nokta-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #f3e8ff 0%, #e0f2fe 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #shape-label {
            font-size: 22px;
            font-weight: 800;
            color: #5b21b6;
            margin: 6px 0 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #progress-bar {
            display: flex;
            gap: 8px;
            margin: 6px 0;
        }

        .prog-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #d8b4fe;
            transition: background 0.3s;
        }

        .prog-dot.done { background: #7c3aed; }
        .prog-dot.active { background: #a855f7; box-shadow: 0 0 0 3px #d8b4fe; }

        #svg-container {
            width: min(420px, 95vw);
            height: min(420px, 95vw);
        }

        #game-svg {
            width: 100%;
            height: 100%;
            touch-action: none;
            user-select: none;
        }

        .dot-circle {
            cursor: pointer;
            transition: r 0.15s;
        }

        .dot-circle:hover { r: 24; }

        .dot-number {
            font-size: 16px;
            font-weight: 800;
            fill: white;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
        }

        .drawn-line {
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .shape-fill {
            opacity: 0;
            transition: opacity 0.6s;
        }
        .shape-fill.show { opacity: 0.25; }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; r: 15; }
            50%       { opacity: 0.55; r: 19; }
        }
        .pulse-dot {
            animation: pulseDot 0.9s ease-in-out infinite;
        }

        #instruction-bar {
            background: rgba(255,255,255,0.9);
            border-radius: 16px;
            padding: 8px 20px;
            font-size: 15px;
            font-weight: 600;
            color: #4c1d95;
            margin: 0 16px 6px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            width: calc(100% - 32px);
            max-width: 420px;
        }

    </style>
</head>
<body class="nokta-page">
    <div id="celebration-overlay" class="overlay hidden">
        <div class="celebration-content">🎉⭐</div>
    </div>

    <div class="carousel-header">
        <a href="sekiller_menu.html" class="back-btn-carousel">⬅</a>
        <button class="replay-header-btn" id="replay-btn">🔊 Tekrar</button>
    </div>

    <div id="shape-label">Üçgen</div>
    <div id="progress-bar"></div>
<div id="svg-container">
        <svg id="game-svg" viewBox="0 0 400 400"></svg>
    </div>

    <script src="js/noktalari_birlestir.js"></script>
    <script src="js/common_bgm.js"></script>
</body>
</html>
