<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Özel Eğitim Oyunu</title>
    <meta name="theme-color" content="#3b82f6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EğitimOyunu">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/sw-register.js" defer></script>
</head>
<body class="carousel-page">

    <!-- Splash Screen -->
    <div id="splash-screen">
        <video id="splash-video" src="assets/sounds/oyun_giriş_animasyonu.mp4" autoplay playsinline preload="auto" style="opacity:0;transition:opacity 0.1s;pointer-events:none"></video>
        <button id="splash-skip-btn">▶ Hemen Başla</button>
    </div>

    <div class="carousel-header"></div>

    <div class="main-menu-grid" id="carousel" data-sfx="true">
        <a href="meyveler_menu.html" class="menu-img-btn" data-title="Meyveler">
            <button class="explore-btn">👆🏽 Hadi Seç!</button>
            <img src="assets/images/meyveler.png" alt="Meyveler">
        </a>
        <a href="renkler_menu.html" class="menu-img-btn" data-title="Renkler">
            <button class="explore-btn">👆🏽 Hadi Seç!</button>
            <img src="assets/images/renkler.png" alt="Renkler">
        </a>
        <a href="sekiller_menu.html" class="menu-img-btn" data-title="Şekiller">
            <button class="explore-btn">👆🏽 Hadi Seç!</button>
            <img src="assets/images/sekiller.png" alt="Şekiller">
        </a>
        <a href="nesneler_menu.html" class="menu-img-btn" data-title="Nesneler">
            <button class="explore-btn">👆🏽 Hadi Seç!</button>
            <img src="assets/images/nesneler.png" alt="Nesneler">
        </a>
        <a href="hayvanlar_menu.html" class="menu-img-btn" data-title="Hayvanlar">
            <button class="explore-btn">👆🏽 Hadi Seç!</button>
            <img src="assets/images/hayvanlar.png" alt="Hayvanlar">
        </a>
    </div>

    <button class="carousel-arrow carousel-prev" id="prevBtn">&#8592;</button>
    <button class="carousel-arrow carousel-next" id="nextBtn">&#8594;</button>

    <div class="carousel-dots" id="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <script src="js/common_bgm.js"></script>
    <script src="js/carousel.js"></script>
    <script>
        (function() {
            const splash = document.getElementById('splash-screen');
            const video = document.getElementById('splash-video');
            function blockEvent(e) { e.stopPropagation(); e.preventDefault(); }

            function hideSplash() {
                sessionStorage.setItem('splashSeen', '1');
                video.pause();
                video.muted = true;
                // Fade süresince alttaki menü kartlarına tıklamayı engelle
                document.addEventListener('click', blockEvent, true);
                document.addEventListener('touchend', blockEvent, true);
                document.addEventListener('pointerup', blockEvent, true);
                splash.classList.add('fade-out');
                setTimeout(() => {
                    splash.classList.add('hidden');
                    document.removeEventListener('click', blockEvent, true);
                    document.removeEventListener('touchend', blockEvent, true);
                    document.removeEventListener('pointerup', blockEvent, true);
                }, 800);
            }

            // Daha önce görüldüyse anında gizle
            if (sessionStorage.getItem('splashSeen')) {
                video.pause();
                video.removeAttribute('autoplay');
                video.src = '';
                splash.classList.add('hidden');
            } else {
                video.addEventListener('canplay', () => { video.style.opacity = '1'; }, { once: true });
                video.addEventListener('ended', hideSplash);
                video.addEventListener('error', () => setTimeout(hideSplash, 500));

                const p = video.play();
                if (p) p.catch(() => { video.muted = true; video.play().catch(() => {}); });

                splash.addEventListener('pointerdown', function(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    hideSplash();
                }, { once: true });

                document.getElementById('splash-skip-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    hideSplash();
                });
            }
        })();
    </script>

</body>
</html>
