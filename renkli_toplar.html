<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Renkli Toplar</title>
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="js/sw-register.js" defer></script>
    <style>
        .toplar-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 20px 0;
            overflow: hidden;
        }

        .game-area {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 24px;
            width: 100%;
            max-width: 700px;
            padding: 12px 16px;
            flex: 1;
        }

        /* SEPET */
        #basket-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        #basket-drop {
            width: 260px;
            height: 260px;
            border-radius: 50% 50% 40% 40% / 30% 30% 50% 50%;
            background: radial-gradient(ellipse at 40% 30%, #f5deb3, #d2a96a 60%, #a0724a);
            box-shadow: 0 6px 20px rgba(0,0,0,0.25), inset 0 -4px 8px rgba(0,0,0,0.15);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 104px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: default;
            border: 3px dashed transparent;
        }

        #basket-drop.drag-over {
            transform: scale(1.08);
            border-color: #22c55e;
            box-shadow: 0 0 0 6px rgba(34,197,94,0.25), 0 6px 20px rgba(0,0,0,0.25);
        }

        #basket-drop.correct-flash {
            animation: correctFlash 0.5s ease;
        }

        @keyframes correctFlash {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        #basket-label {
            font-size: 14px;
            font-weight: 700;
            color: #7c5c3a;
            text-align: center;
        }

        /* TOPLAR */
        #balls-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            flex: 1;
            max-width: 380px;
            padding-top: 172px;
        }

        .ball {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            cursor: grab;
            transition: transform 0.15s, opacity 0.3s;
            position: relative;
            touch-action: none;
            user-select: none;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.25);
        }

        .ball:active { cursor: grabbing; transform: scale(1.1); }

        .ball.placed {
            opacity: 0;
            pointer-events: none;
            transform: none;
            transition: none;
        }

        .ball.shake {
            animation: ballShake 0.5s ease;
        }

        @keyframes ballShake {
            0%,100% { transform: translateX(0); }
            20%     { transform: translateX(-8px) rotate(-5deg); }
            40%     { transform: translateX(8px) rotate(5deg); }
            60%     { transform: translateX(-6px); }
            80%     { transform: translateX(6px); }
        }

        /* Komut kutusu */
        #command-box {
            background: rgba(255,255,255,0.9);
            border-radius: 16px;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: 700;
            color: #1e3a5f;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            margin: 4px 16px 0;
            width: calc(100% - 32px);
            max-width: 668px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #command-color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid rgba(0,0,0,0.15);
            box-shadow: 1px 1px 4px rgba(0,0,0,0.2);
        }

        @media (max-width: 480px) {
            .game-area {
                flex-direction: column;
                gap: 16px;
                padding: 8px 12px;
            }
            #basket-drop { width: 220px; height: 220px; font-size: 88px; }
            #balls-container { grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 100%; padding-top: 140px; }
            .ball { width: 60px; height: 60px; }
        }
    </style>
</head>
<body class="toplar-page">
    <div id="celebration-overlay" class="overlay hidden">
        <div class="celebration-content">🎉🏆</div>
    </div>

    <div class="carousel-header">
        <a href="renkler_menu.html" class="back-btn-carousel">⬅</a>
        <button class="replay-header-btn" id="replay-btn">🔊 Tekrar</button>
    </div>

    <div id="command-box">
        <div id="command-color-dot"></div>
        <span id="command-text">Oyun başlıyor...</span>
    </div>

    <div class="game-area">
        <div id="basket-zone">
            <div id="basket-drop">🧺</div>
            <div id="basket-label">Sepet</div>
        </div>
        <div id="balls-container"></div>
    </div>

        <script src="js/common_bgm.js"></script>
    <script src="js/renkli_toplar.js"></script>
</body>
</html>
