<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hayvan Eşleştirme</title>
    <meta name="theme-color" content="#22c55e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Kart flip animasyonu için */
        .fruit-wrapper { perspective: 700px; }
        .card-inner {
            transform-style: preserve-3d;
            display: inline-block;
        }
        .card-front {
            display: block;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            transform: rotateY(180deg);
            background: radial-gradient(circle at 40% 35%, #fde68a, #f59e0b);
            border-radius: 20px;
            border: 3px solid #d97706;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="js/sw-register.js" defer></script>
</head>
<body>
    <div id="celebration-overlay" class="overlay hidden">
        <div class="celebration-content">🤩👏</div>
    </div>

    <div class="carousel-header">
        <a href="hayvanlar_menu.html" class="back-btn-carousel">⬅</a>
    </div>

    <div class="game-container" style="max-width: 1200px;">

        <button id="play-audio-btn" class="audio-btn">🔊 Sesi Tekrar Dinle</button>

        <div class="matching-board">
            <div id="left-column" class="match-column"></div>
            <div id="right-column" class="match-column"></div>
        </div>
    </div>

        <script src="js/common_bgm.js"></script>
    <script src="js/hayvan_eslestirme.js"></script>
<script src="js/dev_menu.js"></script>
</body>
</html>
