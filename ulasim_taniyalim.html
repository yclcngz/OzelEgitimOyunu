<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ulaşım Araçlarını Tanıyalım</title>
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="js/sw-register.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #e5e7eb;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            width: 100%;
            height: 100vh;
        }

        /* ---- Üst Bar ---- */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            background: #1e3a8a;
            flex-shrink: 0;
            gap: 10px;
        }

        .back-btn-carousel {
            font-size: 22px;
            color: white;
            text-decoration: none;
            line-height: 1;
            flex-shrink: 0;
        }

        .vehicle-label {
            font-size: clamp(18px, 4.5vw, 28px);
            font-weight: 800;
            color: white;
            letter-spacing: 1px;
            flex: 1;
            text-align: center;
        }

        .prog-bar {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }

        .prog-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: background 0.3s;
        }
        .prog-dot.active { background: #fbbf24; }
        .prog-dot.done   { background: #22c55e; }

        /* ---- Slot Alanı (üst) ---- */
        #slot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            flex: 1;
            min-height: 0;
            gap: 6px;
            padding: 8px;
            align-items: center;
            justify-items: center;
        }

        .puzzle-slot {
            position: relative;
            aspect-ratio: 1 / 1;
            width: 100%;
            max-height: 100%;
            border-radius: 12px;
            border: 3px dashed rgba(255,255,255,0.35);
            background-color: rgba(255,255,255,0.06);
            background-repeat: no-repeat;
            background-size: 200% 200%;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        /* Slotun içindeki soluk rehber */
        .slot-hint {
            position: absolute;
            inset: 0;
            background-repeat: no-repeat;
            background-size: 200% 200%;
            opacity: 0.18;
            border-radius: 9px;
            pointer-events: none;
        }

        .puzzle-slot.filled {
            border: 4px solid #22c55e;
            box-shadow: 0 0 0 3px #22c55e;
            background-color: transparent;
        }

        .puzzle-slot.filled .slot-hint {
            opacity: 1;
        }

        /* ---- Parça Tepsisi (alt) ---- */
        #piece-tray {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: rgba(0,0,0,0.15);
            flex-shrink: 0;
        }

        .puzzle-piece {
            width: clamp(60px, calc((100vw - 56px) / 4), 130px);
            aspect-ratio: 1 / 1;
            border-radius: 10px;
            border: 3px solid rgba(255,255,255,0.55);
            background-repeat: no-repeat;
            background-size: 200% 200%;
            cursor: grab;
            touch-action: none;
            user-select: none;
            transition: opacity 0.25s, transform 0.15s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }

        .puzzle-piece.placed {
            opacity: 0;
            pointer-events: none;
        }

        .puzzle-piece:active {
            transform: scale(0.94);
        }
    </style>
</head>
<body>
    <div id="celebration-overlay" class="overlay hidden">
        <div class="celebration-content">🤩👏</div>
    </div>

    <div class="top-bar">
        <a href="nesneler_menu.html" class="back-btn-carousel">⬅</a>
        <div id="vehicle-label" class="vehicle-label"></div>
        <div id="progress-bar" class="prog-bar"></div>
        <div id="bgm-btn-slot"></div>
    </div>

    <div id="slot-grid"></div>
    <div id="piece-tray"></div>

    <script src="js/common_bgm.js"></script>
    <script src="js/ulasim_game.js"></script>
    <script src="js/dev_menu.js"></script>
</body>
</html>
